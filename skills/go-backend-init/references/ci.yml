name: CI

on:
  push:
    branches:
      - main
      - release
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - main
      - release
    paths-ignore:
      - "**/*.md"

jobs:
  lint:
    if: ${{ github.event_name == 'push' }}
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-env
      - name: Lint
        uses: golangci/golangci-lint-action@v8.0.0
        with:
          args: "--timeout=7m"

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-env
      - name: Unit Test
        run: go test ./...

  nilaway:
    name: Nilaway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-env
      - name: Install Nilaway
        run: go install go.uber.org/nilaway/cmd/nilaway@latest
      - name: Nilaway
        # Replace {{MODULE_PATH}} with your Go module path
        # Exclude generated code directories (ent/, api/)
        run: nilaway -include-pkgs="{{MODULE_PATH}}" --exclude-pkgs="{{MODULE_PATH}}/ent" ./...

  build-test:
    if: ${{ github.event_name == 'pull_request' }}
    name: Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-env
      - name: Build
        run: go build ./...

  autofix:
    if: ${{ github.event_name == 'pull_request' }}
    name: Lint and Auto Fix
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-env

      - name: Go mod tidy
        run: |
          go mod tidy

      - name: Fix lint
        uses: golangci/golangci-lint-action@v8.0.0
        with:
          args: "--timeout=7m --fix"

      - name: Commit & Push changes
        run: |
          # Skip if last commit is already an autofix
          if [[ "$(git log -1 --pretty=%B)" == *"[autofix]"* ]]; then
            echo "Skip autofix: last commit already marked as [autofix]"
            exit 0
          fi

          # Check for changes
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .

            # Try to commit and push, handling conflicts
            if ! git commit -m "[autofix] chore: autofix"; then
              echo "Failed to commit changes"
              exit 1
            fi

            # Try to rebase, exit if conflict
            if ! git pull --rebase origin "${GITHUB_HEAD_REF}"; then
              echo "Merge conflict detected, skipping autofix"
              git rebase --abort
              exit 1
            fi

            # Try to push, exit if rejected
            if ! git push origin HEAD:${GITHUB_HEAD_REF}; then
              echo "Push rejected, skipping autofix"
              exit 1
            fi
          else
            echo "No changes to commit"
          fi
